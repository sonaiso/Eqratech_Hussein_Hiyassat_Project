name: Coq CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Coq + build
        uses: coq-community/docker-coq-action@v1
        with:
          coq_version: '8.19'
          custom_script: |
            set -euo pipefail

            # Use a writable build directory
            BUILD_DIR="/tmp/coq-build"
            rm -rf "$BUILD_DIR"
            mkdir -p "$BUILD_DIR"

            # Copy sources into the writable dir (simplest, avoids mount permission issues)
            cp -R coq/. "$BUILD_DIR/"
            cd "$BUILD_DIR"

            if command -v coq_makefile >/dev/null 2>&1 && [ -f _CoqProject ]; then
              coq_makefile -f _CoqProject -o Makefile
              make -j2
            elif [ -f Makefile ]; then
              make -j2
            else
              find . -name '*.v' -print0 | xargs -0 -n1 coqc
            fi