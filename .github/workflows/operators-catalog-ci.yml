name: Operators Catalog CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  operators-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Regenerate operators catalog (enriched)
        run: |
          bash scripts/generate_operators_catalog_enriched.sh

      - name: QA enriched operators catalog
        run: |
          python3 scripts/qa_operators_enriched.py

      - name: Ensure generated CSVs are committed (no drift)
        run: |
          git diff --exit-code -- \
            data/operators_catalog_split_project_enriched.csv \
            data/operators_catalog_split_enriched.csv || {
              echo "Generated operators catalogs differ from committed versions."
              echo "Run: bash scripts/generate_operators_catalog_enriched.sh"
              echo "Then: python3 scripts/qa_operators_enriched.py"
              echo "Then commit the updated CSVs."
              exit 1
            }