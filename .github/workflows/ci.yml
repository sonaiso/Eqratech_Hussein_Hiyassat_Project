# Stage 10 — Orchestrator CI & Quality Gates
# Verifies: pipeline contract, routing, validation, presentation, explainability.
# Fails on: orchestrator test failure, routing/validation/presentation/explainability regression.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONHASHSEED: "0"

jobs:
  orchestrator-ci:
    name: Orchestrator & quality gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest hypothesis pytest-cov

      - name: Run orchestrator integration tests
        env:
          PYTHONPATH: src
        run: |
          pytest tests/orchestrator -q -ra
        continue-on-error: false

      - name: Run core engine smoke tests (if present)
        env:
          PYTHONPATH: src
        run: |
          if [ -d tests/engines ]; then pytest tests/engines -q -ra || true; else echo "tests/engines not found, skipping"; fi

      - name: Generate coverage report
        env:
          PYTHONPATH: src
        run: |
          pytest tests/orchestrator --cov=src --cov-report=xml --cov-report=term-missing -q
        continue-on-error: true

      - name: Pytest summary
        if: always()
        run: |
          echo "Orchestrator CI job completed. Check previous step output for any failures."

  # Existing Coq skeleton job (optional; does not block orchestrator pass)
  coq-skeleton:
    name: Coq skeleton
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq

      - name: Compile Coq skeletons
        run: |
          coqc coq/Gates/GateSukun.v
          coqc coq/Gates/GateShadda.v
          coqc coq/Gates/GateTanwin.v
